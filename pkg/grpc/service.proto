syntax = "proto3";

package softserve;

option go_package = "github.com/charmbracelet/soft-serve/pkg/grpc;grpc";

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";

// GitServerManagement provides full administrative control over the Soft Serve git server
service GitServerManagement {
  // Repository Management
  rpc CreateRepository(CreateRepositoryRequest) returns (Repository);
  rpc DeleteRepository(DeleteRepositoryRequest) returns (google.protobuf.Empty);
  rpc GetRepository(GetRepositoryRequest) returns (Repository);
  rpc ListRepositories(ListRepositoriesRequest) returns (ListRepositoriesResponse);
  rpc RenameRepository(RenameRepositoryRequest) returns (Repository);
  rpc UpdateRepository(UpdateRepositoryRequest) returns (Repository);
  rpc ImportRepository(ImportRepositoryRequest) returns (Repository);

  // User Management
  rpc CreateUser(CreateUserRequest) returns (User);
  rpc DeleteUser(DeleteUserRequest) returns (google.protobuf.Empty);
  rpc GetUser(GetUserRequest) returns (User);
  rpc ListUsers(ListUsersRequest) returns (ListUsersResponse);
  rpc UpdateUser(UpdateUserRequest) returns (User);
  
  // User Public Keys
  rpc AddPublicKey(AddPublicKeyRequest) returns (google.protobuf.Empty);
  rpc RemovePublicKey(RemovePublicKeyRequest) returns (google.protobuf.Empty);
  rpc ListPublicKeys(ListPublicKeysRequest) returns (ListPublicKeysResponse);

  // Collaborator Management
  rpc AddCollaborator(AddCollaboratorRequest) returns (google.protobuf.Empty);
  rpc RemoveCollaborator(RemoveCollaboratorRequest) returns (google.protobuf.Empty);
  rpc ListCollaborators(ListCollaboratorsRequest) returns (ListCollaboratorsResponse);

  // Access Token Management
  rpc CreateAccessToken(CreateAccessTokenRequest) returns (AccessToken);
  rpc DeleteAccessToken(DeleteAccessTokenRequest) returns (google.protobuf.Empty);
  rpc ListAccessTokens(ListAccessTokensRequest) returns (ListAccessTokensResponse);

  // Webhook Management
  rpc CreateWebhook(CreateWebhookRequest) returns (Webhook);
  rpc DeleteWebhook(DeleteWebhookRequest) returns (google.protobuf.Empty);
  rpc GetWebhook(GetWebhookRequest) returns (Webhook);
  rpc ListWebhooks(ListWebhooksRequest) returns (ListWebhooksResponse);
  rpc UpdateWebhook(UpdateWebhookRequest) returns (Webhook);

  // Server Settings
  rpc GetSettings(google.protobuf.Empty) returns (ServerSettings);
  rpc UpdateSettings(UpdateSettingsRequest) returns (ServerSettings);

  // Health Check
  rpc HealthCheck(google.protobuf.Empty) returns (HealthCheckResponse);
}

// Repository Messages
message Repository {
  int64 id = 1;
  string name = 2;
  string project_name = 3;
  string description = 4;
  bool is_private = 5;
  bool is_mirror = 6;
  bool is_hidden = 7;
  int64 user_id = 8;
  google.protobuf.Timestamp created_at = 9;
  google.protobuf.Timestamp updated_at = 10;
}

message CreateRepositoryRequest {
  string name = 1;
  string username = 2; // Optional: owner username
  string project_name = 3;
  string description = 4;
  bool private = 5;
  bool mirror = 6;
  bool hidden = 7;
}

message DeleteRepositoryRequest {
  string name = 1;
}

message GetRepositoryRequest {
  string name = 1;
}

message ListRepositoriesRequest {
  // Pagination could be added here
}

message ListRepositoriesResponse {
  repeated Repository repositories = 1;
}

message RenameRepositoryRequest {
  string old_name = 1;
  string new_name = 2;
}

message UpdateRepositoryRequest {
  string name = 1;
  optional string description = 2;
  optional bool is_private = 3;
  optional bool is_hidden = 4;
  optional string project_name = 5;
}

message ImportRepositoryRequest {
  string name = 1;
  string remote_url = 2;
  string username = 3; // Optional: owner username
  string project_name = 4;
  string description = 5;
  bool private = 6;
  bool hidden = 7;
}

// User Messages
message User {
  int64 id = 1;
  string username = 2;
  bool is_admin = 3;
  repeated string public_keys = 4;
}

message CreateUserRequest {
  string username = 1;
  bool admin = 2;
  optional string password = 3;
  repeated string public_keys = 4;
}

message DeleteUserRequest {
  string username = 1;
}

message GetUserRequest {
  string username = 1;
}

message ListUsersRequest {
  // Pagination could be added here
}

message ListUsersResponse {
  repeated User users = 1;
}

message UpdateUserRequest {
  string username = 1;
  optional string new_username = 2;
  optional bool admin = 3;
  optional string password = 4;
}

// Public Key Messages
message AddPublicKeyRequest {
  string username = 1;
  string public_key = 2;
}

message RemovePublicKeyRequest {
  string username = 1;
  string public_key = 2;
}

message ListPublicKeysRequest {
  string username = 1;
}

message ListPublicKeysResponse {
  repeated string public_keys = 1;
}

// Collaborator Messages
message Collaborator {
  string username = 1;
  AccessLevel access_level = 2;
}

enum AccessLevel {
  ACCESS_LEVEL_UNSPECIFIED = 0;
  NO_ACCESS = 1;
  READ_ONLY = 2;
  READ_WRITE = 3;
  ADMIN_ACCESS = 4;
}

message AddCollaboratorRequest {
  string repo_name = 1;
  string username = 2;
  AccessLevel access_level = 3;
}

message RemoveCollaboratorRequest {
  string repo_name = 1;
  string username = 2;
}

message ListCollaboratorsRequest {
  string repo_name = 1;
}

message ListCollaboratorsResponse {
  repeated Collaborator collaborators = 1;
}

// Access Token Messages
message AccessToken {
  int64 id = 1;
  string name = 2;
  string token = 3; // Only returned on creation
  google.protobuf.Timestamp created_at = 4;
  google.protobuf.Timestamp expires_at = 5;
}

message CreateAccessTokenRequest {
  string username = 1;
  string name = 2;
  optional google.protobuf.Timestamp expires_at = 3;
}

message DeleteAccessTokenRequest {
  string username = 1;
  int64 token_id = 2;
}

message ListAccessTokensRequest {
  string username = 1;
}

message ListAccessTokensResponse {
  repeated AccessToken tokens = 1;
}

// Webhook Messages
message Webhook {
  int64 id = 1;
  string url = 2;
  string content_type = 3;
  repeated string events = 4;
  bool active = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp updated_at = 7;
}

message CreateWebhookRequest {
  string repo_name = 1;
  string url = 2;
  string content_type = 3; // "json" or "form"
  optional string secret = 4;
  repeated string events = 5;
  bool active = 6;
}

message DeleteWebhookRequest {
  string repo_name = 1;
  int64 webhook_id = 2;
}

message GetWebhookRequest {
  string repo_name = 1;
  int64 webhook_id = 2;
}

message ListWebhooksRequest {
  string repo_name = 1;
}

message ListWebhooksResponse {
  repeated Webhook webhooks = 1;
}

message UpdateWebhookRequest {
  string repo_name = 1;
  int64 webhook_id = 2;
  optional string url = 3;
  optional string content_type = 4;
  optional string secret = 5;
  repeated string events = 6;
  optional bool active = 7;
}

// Server Settings Messages
message ServerSettings {
  bool allow_keyless = 1;
  AccessLevel anon_access = 2;
}

message UpdateSettingsRequest {
  optional bool allow_keyless = 1;
  optional AccessLevel anon_access = 2;
}

// Health Check
message HealthCheckResponse {
  string status = 1;
  string version = 2;
}
