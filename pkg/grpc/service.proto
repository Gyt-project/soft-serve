syntax = "proto3";

package softserve;

option go_package = "github.com/Gyt-project/soft-serve/pkg/grpc;grpc";

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";

// GitServerManagement provides full administrative control over the Soft Serve git server
service GitServerManagement {
  // Repository Management
  rpc CreateRepository(CreateRepositoryRequest) returns (Repository);
  rpc DeleteRepository(DeleteRepositoryRequest) returns (google.protobuf.Empty);
  rpc GetRepository(GetRepositoryRequest) returns (Repository);
  rpc ListRepositories(ListRepositoriesRequest) returns (ListRepositoriesResponse);
  rpc RenameRepository(RenameRepositoryRequest) returns (Repository);
  rpc UpdateRepository(UpdateRepositoryRequest) returns (Repository);
  rpc ImportRepository(ImportRepositoryRequest) returns (Repository);

  // Repository Content Browsing
  rpc GetTree(GetTreeRequest) returns (GetTreeResponse);
  rpc GetBlob(GetBlobRequest) returns (GetBlobResponse);
  rpc GetBranches(GetBranchesRequest) returns (GetBranchesResponse);
  rpc CreateBranch(CreateBranchRequest) returns (Branch);
  rpc DeleteBranch(DeleteBranchRequest) returns (google.protobuf.Empty);
  rpc ListCommits(ListCommitsRequest) returns (ListCommitsResponse);
  rpc GetCommit(GetCommitRequest) returns (CommitDetail);
  rpc ListUserRepositories(ListUserRepositoriesRequest) returns (ListRepositoriesResponse);

  // Tags
  rpc ListTags(ListTagsRequest) returns (ListTagsResponse);
  rpc GetTag(GetTagRequest) returns (TagDetail);
  rpc CreateTag(CreateTagRequest) returns (TagDetail);
  rpc DeleteTag(DeleteTagRequest) returns (google.protobuf.Empty);

  // Diff & Compare
  rpc CompareBranches(CompareBranchesRequest) returns (CompareResponse);
  rpc CompareCommits(CompareCommitsRequest) returns (CompareResponse);

  // Repository Info
  rpc GetDefaultBranch(GetDefaultBranchRequest) returns (DefaultBranchResponse);
  rpc SetDefaultBranch(SetDefaultBranchRequest) returns (DefaultBranchResponse);
  rpc GetCloneURLs(GetCloneURLsRequest) returns (CloneURLsResponse);
  rpc GetRepositoryStats(GetRepositoryStatsRequest) returns (RepositoryStatsResponse);

  // Advanced Operations
  rpc GetFileHistory(GetFileHistoryRequest) returns (GetFileHistoryResponse);
  rpc SearchCommits(SearchCommitsRequest) returns (ListCommitsResponse);
  rpc CheckPath(CheckPathRequest) returns (CheckPathResponse);
  rpc MergeBranches(MergeBranchesRequest) returns (MergeBranchesResponse);

  // User Management
  rpc CreateUser(CreateUserRequest) returns (User);
  rpc DeleteUser(DeleteUserRequest) returns (google.protobuf.Empty);
  rpc GetUser(GetUserRequest) returns (User);
  rpc ListUsers(ListUsersRequest) returns (ListUsersResponse);
  rpc UpdateUser(UpdateUserRequest) returns (User);

  // User Public Keys
  rpc AddPublicKey(AddPublicKeyRequest) returns (google.protobuf.Empty);
  rpc RemovePublicKey(RemovePublicKeyRequest) returns (google.protobuf.Empty);
  rpc ListPublicKeys(ListPublicKeysRequest) returns (ListPublicKeysResponse);

  // Collaborator Management
  rpc AddCollaborator(AddCollaboratorRequest) returns (google.protobuf.Empty);
  rpc RemoveCollaborator(RemoveCollaboratorRequest) returns (google.protobuf.Empty);
  rpc ListCollaborators(ListCollaboratorsRequest) returns (ListCollaboratorsResponse);

  // Access Token Management
  rpc CreateAccessToken(CreateAccessTokenRequest) returns (AccessToken);
  rpc DeleteAccessToken(DeleteAccessTokenRequest) returns (google.protobuf.Empty);
  rpc ListAccessTokens(ListAccessTokensRequest) returns (ListAccessTokensResponse);

  // Webhook Management
  rpc CreateWebhook(CreateWebhookRequest) returns (Webhook);
  rpc DeleteWebhook(DeleteWebhookRequest) returns (google.protobuf.Empty);
  rpc GetWebhook(GetWebhookRequest) returns (Webhook);
  rpc ListWebhooks(ListWebhooksRequest) returns (ListWebhooksResponse);
  rpc UpdateWebhook(UpdateWebhookRequest) returns (Webhook);

  // Server Settings
  rpc GetSettings(google.protobuf.Empty) returns (ServerSettings);
  rpc UpdateSettings(UpdateSettingsRequest) returns (ServerSettings);

  // Health Check
  rpc HealthCheck(google.protobuf.Empty) returns (HealthCheckResponse);
}

// Repository Messages
message Repository {
  int64 id = 1;
  string name = 2;
  string project_name = 3;
  string description = 4;
  bool is_private = 5;
  bool is_mirror = 6;
  bool is_hidden = 7;
  int64 user_id = 8;
  google.protobuf.Timestamp created_at = 9;
  google.protobuf.Timestamp updated_at = 10;
}

message CreateRepositoryRequest {
  string name = 1;
  string username = 2; // Optional: owner username
  string project_name = 3;
  string description = 4;
  bool private = 5;
  bool mirror = 6;
  bool hidden = 7;
}

message DeleteRepositoryRequest {
  string name = 1;
}

message GetRepositoryRequest {
  string name = 1;
}

message ListRepositoriesRequest {
  // Pagination could be added here
}

message ListRepositoriesResponse {
  repeated Repository repositories = 1;
}

message RenameRepositoryRequest {
  string old_name = 1;
  string new_name = 2;
}

message UpdateRepositoryRequest {
  string name = 1;
  optional string description = 2;
  optional bool is_private = 3;
  optional bool is_hidden = 4;
  optional string project_name = 5;
}

message ImportRepositoryRequest {
  string name = 1;
  string remote_url = 2;
  string username = 3; // Optional: owner username
  string project_name = 4;
  string description = 5;
  bool private = 6;
  bool hidden = 7;
}

// User Messages
message User {
  int64 id = 1;
  string username = 2;
  bool is_admin = 3;
  repeated string public_keys = 4;
}

message CreateUserRequest {
  string username = 1;
  bool admin = 2;
  optional string password = 3;
  repeated string public_keys = 4;
}

message DeleteUserRequest {
  string username = 1;
}

message GetUserRequest {
  string username = 1;
}

message ListUsersRequest {
  // Pagination could be added here
}

message ListUsersResponse {
  repeated User users = 1;
}

message UpdateUserRequest {
  string username = 1;
  optional string new_username = 2;
  optional bool admin = 3;
  optional string password = 4;
}

// Public Key Messages
message AddPublicKeyRequest {
  string username = 1;
  string public_key = 2;
}

message RemovePublicKeyRequest {
  string username = 1;
  string public_key = 2;
}

message ListPublicKeysRequest {
  string username = 1;
}

message ListPublicKeysResponse {
  repeated string public_keys = 1;
}

// Collaborator Messages
message Collaborator {
  string username = 1;
  AccessLevel access_level = 2;
}

enum AccessLevel {
  ACCESS_LEVEL_UNSPECIFIED = 0;
  NO_ACCESS = 1;
  READ_ONLY = 2;
  READ_WRITE = 3;
  ADMIN_ACCESS = 4;
}

message AddCollaboratorRequest {
  string repo_name = 1;
  string username = 2;
  AccessLevel access_level = 3;
}

message RemoveCollaboratorRequest {
  string repo_name = 1;
  string username = 2;
}

message ListCollaboratorsRequest {
  string repo_name = 1;
}

message ListCollaboratorsResponse {
  repeated Collaborator collaborators = 1;
}

// Access Token Messages
message AccessToken {
  int64 id = 1;
  string name = 2;
  string token = 3; // Only returned on creation
  google.protobuf.Timestamp created_at = 4;
  google.protobuf.Timestamp expires_at = 5;
}

message CreateAccessTokenRequest {
  string username = 1;
  string name = 2;
  optional google.protobuf.Timestamp expires_at = 3;
}

message DeleteAccessTokenRequest {
  string username = 1;
  int64 token_id = 2;
}

message ListAccessTokensRequest {
  string username = 1;
}

message ListAccessTokensResponse {
  repeated AccessToken tokens = 1;
}

// Webhook Messages
message Webhook {
  int64 id = 1;
  string url = 2;
  string content_type = 3;
  repeated string events = 4;
  bool active = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp updated_at = 7;
}

message CreateWebhookRequest {
  string repo_name = 1;
  string url = 2;
  string content_type = 3; // "json" or "form"
  optional string secret = 4;
  repeated string events = 5;
  bool active = 6;
}

message DeleteWebhookRequest {
  string repo_name = 1;
  int64 webhook_id = 2;
}

message GetWebhookRequest {
  string repo_name = 1;
  int64 webhook_id = 2;
}

message ListWebhooksRequest {
  string repo_name = 1;
}

message ListWebhooksResponse {
  repeated Webhook webhooks = 1;
}

message UpdateWebhookRequest {
  string repo_name = 1;
  int64 webhook_id = 2;
  optional string url = 3;
  optional string content_type = 4;
  optional string secret = 5;
  repeated string events = 6;
  optional bool active = 7;
}

// Server Settings Messages
message ServerSettings {
  bool allow_keyless = 1;
  AccessLevel anon_access = 2;
}

message UpdateSettingsRequest {
  optional bool allow_keyless = 1;
  optional AccessLevel anon_access = 2;
}

// Health Check
message HealthCheckResponse {
  string status = 1;
  string version = 2;
}

// Repository Content Messages
message GetTreeRequest {
  string repo_name = 1;
  optional string ref = 2; // branch/tag/commit, defaults to HEAD
  optional string path = 3; // path within the tree, defaults to root
}

message TreeEntry {
  string name = 1;
  string path = 2;
  string mode = 3;
  int64 size = 4;
  bool is_dir = 5;
  bool is_submodule = 6;
}

message GetTreeResponse {
  repeated TreeEntry entries = 1;
  string ref = 2; // actual ref used (resolved from HEAD, etc)
}

message GetBlobRequest {
  string repo_name = 1;
  string path = 2; // file path
  optional string ref = 3; // branch/tag/commit, defaults to HEAD
}

message GetBlobResponse {
  bytes content = 1;
  int64 size = 2;
  bool is_binary = 3;
  string path = 4;
}

// Branch Messages
message Branch {
  string name = 1; // Short branch name (e.g., "main")
  string full_name = 2; // Full reference name (e.g., "refs/heads/main")
  string commit_sha = 3; // Commit SHA the branch points to
}

message GetBranchesRequest {
  string repo_name = 1; // Repository name
}

message GetBranchesResponse {
  repeated Branch branches = 1;
}

message CreateBranchRequest {
  string repo_name = 1; // Repository name
  string branch_name = 2; // New branch name
  string source = 3; // Source branch name or commit SHA
}

message DeleteBranchRequest {
  string repo_name = 1; // Repository name
  string branch_name = 2; // Branch to delete
}

// List user repositories
message ListUserRepositoriesRequest {
  string username = 1; // Username to get repositories for
}

// Commit Messages
message Author {
  string name = 1;
  string email = 2;
  google.protobuf.Timestamp when = 3;
}

message Commit {
  string sha = 1; // Commit SHA
  Author author = 2; // Author information
  Author committer = 3; // Committer information
  string message = 4; // Commit message
  repeated string parent_shas = 5; // Parent commit SHAs
}

message ListCommitsRequest {
  string repo_name = 1; // Repository name
  optional string ref = 2;     // Branch/tag/commit to start from (defaults to HEAD)
  optional int32 limit = 3;    // Maximum number of commits to return (default: 30, max: 100)
  optional int32 page = 4;     // Page number for pagination (starts at 1)
}

message ListCommitsResponse {
  repeated Commit commits = 1;
  int32 page = 2; // Current page
  int32 per_page = 3; // Commits per page
  bool has_more = 4; // Whether there are more commits available
}

// Single Commit Detail with Diff
message GetCommitRequest {
  string repo_name = 1;
  string sha = 2; // Commit SHA
}

message FileDiff {
  string path = 1;
  int32 additions = 2;
  int32 deletions = 3;
  string status = 4; // "added", "modified", "deleted", "renamed"
  optional string old_path = 5; // For renamed files
}

message CommitDetail {
  Commit commit = 1;
  repeated FileDiff files = 2;
  int32 total_additions = 3;
  int32 total_deletions = 4;
  int32 files_changed = 5;
  string patch = 6; // Full patch text
}

// Tags Messages
message Tag {
  string name = 1; // Tag name
  string full_name = 2; // Full reference (refs/tags/...)
  string commit_sha = 3; // Commit the tag points to
  optional string message = 4; // Annotation message (for annotated tags)
  optional Author tagger = 5;  // Tagger info (for annotated tags)
}

message ListTagsRequest {
  string repo_name = 1;
}

message ListTagsResponse {
  repeated Tag tags = 1;
}

message GetTagRequest {
  string repo_name = 1;
  string tag_name = 2;
}

message TagDetail {
  Tag tag = 1;
  Commit commit = 2; // The commit the tag points to
}

message CreateTagRequest {
  string repo_name = 1;
  string tag_name = 2;
  string target = 3; // Branch/commit to tag
  optional string message = 4; // For annotated tags
  optional string tagger_name = 5;
  optional string tagger_email = 6;
}

message DeleteTagRequest {
  string repo_name = 1;
  string tag_name = 2;
}

// Compare Messages
message CompareBranchesRequest {
  string repo_name = 1;
  string base_branch = 2;
  string head_branch = 3;
}

message CompareCommitsRequest {
  string repo_name = 1;
  string base_sha = 2;
  string head_sha = 3;
}

message CompareResponse {
  repeated Commit commits = 1; // Commits in head not in base
  repeated FileDiff files = 2;
  int32 total_additions = 3;
  int32 total_deletions = 4;
  int32 files_changed = 5;
  int32 commits_ahead = 6;
  string patch = 7; // Full unified diff patch
}

// Default Branch Messages
message GetDefaultBranchRequest {
  string repo_name = 1;
}

message SetDefaultBranchRequest {
  string repo_name = 1;
  string branch_name = 2;
}

message DefaultBranchResponse {
  string branch_name = 1;
}

// Clone URLs
message GetCloneURLsRequest {
  string repo_name = 1;
}

message CloneURLsResponse {
  string ssh_url = 1;
  string http_url = 2;
  string git_url = 3;
}

// Repository Stats
message GetRepositoryStatsRequest {
  string repo_name = 1;
}

message RepositoryStatsResponse {
  int64 size_bytes = 1;
  int64 commit_count = 2;
  int32 branch_count = 3;
  int32 tag_count = 4;
  int32 contributor_count = 5;
  google.protobuf.Timestamp last_commit = 6;
}

// File History
message GetFileHistoryRequest {
  string repo_name = 1;
  string path = 2;
  optional string ref = 3;     // Branch/tag to search (default: HEAD)
  optional int32 limit = 4;    // Max commits to return (default: 50)
}

message GetFileHistoryResponse {
  repeated Commit commits = 1;
}

// Search Commits
message SearchCommitsRequest {
  string repo_name = 1;
  string query = 2; // Search in commit message
  optional string author = 3;  // Filter by author
  optional string ref = 4;     // Branch/tag to search (default: HEAD)
  optional int32 limit = 5;    // Max results (default: 30, max: 100)
}

// Check Path
message CheckPathRequest {
  string repo_name = 1;
  string path = 2;
  optional string ref = 3;     // Branch/tag/commit (default: HEAD)
}

message CheckPathResponse {
  bool exists = 1;
  bool is_dir = 2;
  bool is_file = 3;
  optional int64 size = 4;     // File size if it's a file
}

// Merge Branches
message MergeBranchesRequest {
  string repo_name    = 1; // Repository name
  string base_branch  = 2; // Branch to merge into
  string head_branch  = 3; // Branch to merge from
  string merge_method = 4; // "merge" | "squash" | "rebase"
  string commit_title = 5; // Optional commit title override
  string committer_name  = 6;
  string committer_email = 7;
}

message MergeBranchesResponse {
  bool   merged     = 1;
  string sha        = 2; // SHA of the resulting merge commit
  string message    = 3;
}
